name: Build archivist-cli

on:
  push:
    branches: [main]
    paths:
      - 'packages/archivist-cli/**'
      - '.github/workflows/build-archivist-cli.yml'
    tags:
      - '[0-9]+.[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9]+'
  workflow_dispatch:
    inputs:
      major:
        description: 'Version majeure (défaut : 0)'
        required: false
        default: '0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.compute-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute tag
        id: compute-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            MAJOR="${{ inputs.major || '0' }}"
            DATE=$(date -u +%Y%m%d)
            EXISTING=$(git tag --list "${MAJOR}.${DATE}.*" | sort -V | tail -1)
            if [ -z "$EXISTING" ]; then
              INCREMENT=1
            else
              INCREMENT=$(echo "$EXISTING" | awk -F. '{print $NF+1}')
            fi
            TAG="${MAJOR}.${DATE}.${INCREMENT}"
            git tag "$TAG"
            git push origin "$TAG"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: packages/archivist-cli

      - name: Run tests
        run: uv run pytest tests/
        working-directory: packages/archivist-cli

      - name: Build binary
        run: uv run pyinstaller archivist-cli.spec
        working-directory: packages/archivist-cli

      - name: Smoke-test binary (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: packages/archivist-cli/dist/archivist --help

      - name: Smoke-test binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: packages/archivist-cli/dist/archivist --help

      - name: Smoke-test binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: packages/archivist-cli/dist/archivist.exe --help

      - name: Rename binary (Linux)
        if: runner.os == 'Linux'
        run: cp packages/archivist-cli/dist/archivist packages/archivist-cli/dist/archivist-linux

      - name: Rename binary (macOS)
        if: runner.os == 'macOS'
        run: cp packages/archivist-cli/dist/archivist packages/archivist-cli/dist/archivist-macos-arm64

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp packages/archivist-cli/dist/archivist.exe packages/archivist-cli/dist/archivist-windows.exe

      # The three upload steps run in parallel and may race to create the
      # GitHub Release. softprops/action-gh-release@v2 tolerates this (upsert).
      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: packages/archivist-cli/dist/archivist-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: packages/archivist-cli/dist/archivist-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: packages/archivist-cli/dist/archivist-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
