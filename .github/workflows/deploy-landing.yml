name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/landing/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/landing/package-lock.json

      - name: Install dependencies
        working-directory: packages/landing
        run: npm ci

      - name: Build
        working-directory: packages/landing
        env:
          BASE_URL: /archivist-ai/
        run: npm run build

      - name: Add 404.html for SPA routing
        run: cp packages/landing/dist/index.html packages/landing/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
