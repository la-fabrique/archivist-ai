name: CI — Référentiel

on:
  push:
    branches: [main]
    paths:
      - "packages/referentiel/**"
      - "scripts/**"
      - "docs/**"
      - "CLAUDE.md"
      - ".harness/**"
      - ".github/workflows/ci-referentiel.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/referentiel/**"
      - "scripts/**"
      - "docs/**"
      - "CLAUDE.md"
      - ".harness/**"
      - ".github/workflows/ci-referentiel.yml"

jobs:
  checks:
    name: Vérifications mécaniques
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies (root)
        run: npm ci

      - name: Install npm dependencies (referentiel-cli)
        run: npm ci --prefix packages/referentiel-cli

      - name: Build referentiel-cli
        run: npm run referentiel-cli:build

      - name: Générer referentiel.yaml
        run: npm run referentiel-cli:export-frontmatters

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Valider referentiel.yaml
        run: python scripts/check_referentiel_yaml.py

      - name: Vérifier liens markdown
        run: npm run check:links

      - name: Vérifier couverture CLAUDE.md
        run: python .harness/scripts/check_claude_coverage.py

      - name: Upload referentiel.yaml
        uses: actions/upload-artifact@v4
        with:
          name: referentiel
          path: packages/referentiel/referentiel.yaml
