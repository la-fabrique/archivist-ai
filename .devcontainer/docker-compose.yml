services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    # network_mode: host lets the container reach the monitoring stack
    # (otel-collector on 4317, prometheus on 9090, grafana on 3000)
    # when started with: docker compose -f .harness/monitoring/compose.yml up -d
    network_mode: host
