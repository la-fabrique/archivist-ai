    <!-- HowTo Schema — 3 étapes de classement -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "Comment utiliser Archivist AI pour classer ses documents",
      "description": "Archivist AI permet de classer automatiquement des documents professionnels via un agent IA en trois étapes.",
      "totalTime": "PT5M",
      "tool": {
        "@type": "HowToTool",
        "name": "Archivist AI",
        "url": "https://github.com/la-fabrique/archivist-ai"
      },
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Initialiser l'arborescence de dossiers",
          "text": "Votre agent IA génère une structure de dossiers professionnelle adaptée à votre profil (SASU, artisan, profession libérale) selon les règles du référentiel Archivist."
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Classifier et nommer chaque document",
          "text": "Votre agent lit le contenu du document (OCR intégré pour les PDF scannés), identifie le type de document, le place dans le bon dossier et lui attribue un nom structuré (date, émetteur, objet)."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Traiter un dossier entier en une passe",
          "text": "Votre agent passe en revue tous les fichiers d'un dossier, propose un plan de classement complet, et n'agit qu'après validation. Aucun fichier n'est supprimé."
        }
      ]
    }
    </script>

    <!-- FAQ Schema — aligné sur le contenu de la page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "C'est quoi le référentiel d'Archivist AI ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le référentiel est un corpus de règles d'archivage professionnel — plan de classement, conventions de nommage, durées de conservation légales — adapté au droit fiscal français (TVA, URSSAF, CFE). Ces règles sont lisibles, documentées et co-construites avec des experts. Votre agent IA les applique fidèlement."
          }
        },
        {
          "@type": "Question",
          "name": "Archivist AI est-il open source ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Archivist AI et son référentiel sont publiés sous licence Apache 2.0 sur GitHub (https://github.com/la-fabrique/archivist-ai). Vous pouvez lire le code, contribuer, et l'héberger vous-même. Une offre avec support dédié est prévue pour les organisations qui préfèrent déléguer."
          }
        },
        {
          "@type": "Question",
          "name": "Comment mon agent IA utilise Archivist AI ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Archivist AI est conçu pour être appelé comme un outil par un agent IA. Votre LLM — Claude, ChatGPT, Copilot ou autre — appelle Archivist pour créer une arborescence, classer un document, ou traiter un dossier entier, sans que vous ayez à ouvrir un terminal."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que mes fichiers quittent mon ordinateur avec Archivist AI ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Archivist tourne localement sur votre machine ou votre serveur. Vos fichiers ne sont jamais envoyés à un service externe. Seul le contenu textuel extrait d'un document peut transiter vers le LLM pour la classification."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce qu'Archivist AI peut supprimer des documents ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non, jamais. Archivist range et organise uniquement — aucune suppression n'est possible. Pour les cas ambigus, l'agent vous soumet une proposition avant d'agir. Chaque action est tracée."
          }
        }
      ]
    }
    </script>
